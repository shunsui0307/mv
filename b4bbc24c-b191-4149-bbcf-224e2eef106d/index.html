    <script>
        (function() {
            // 設定：リダイレクト先のベースURL（SPAサイトのトップなど）
            var redirectTo = "https://mynavi-job20s.jp/mypage/register"; 

            var urlParams = new URLSearchParams(window.location.search);
            var encoded = urlParams.get('utm_customid');
            
            // 全てのパラメータを文字列として取得（例: ?utm_source=...&utm_customid=...）
            var queryString = window.location.search;

            if (encoded) {
                try {
                    var decoded = atob(encoded);
                    
                    // mvtagが存在するか確認して実行
                    var fireTag = function() {
                        if (typeof mvtag === "function") {
                            mvtag("quick_call", {
                                "phone_number": decoded,
                                "delay": 15
                            });
                            console.log("Tag fired for: " + decoded);
                            executeRedirect();
                        } else {
                            // まだ読み込まれていない場合は0.5秒後に再試行
                            setTimeout(fireTag, 500);
                        }
                    };
                    fireTag();

                } catch (e) {
                    console.error("Base64 decode error:", e);
                    executeRedirect(); // エラー時もリダイレクトは実行
                }
            } else {
                // パラメータがない場合も即リダイレクト
                executeRedirect();
            }

            function executeRedirect() {
                // タグの通信時間を考慮して少しだけバッファを持たせる（1秒）
                setTimeout(function() {
                    window.location.href = redirectTo + queryString;
                }, 1000);
            }
        })();
    </script>

<body>
    <p>ページを移動しています。切り替わらない場合は<a id="manual-link" href="#">こちら</a>をクリックしてください。</p>
    <script>
        // 万が一のための手動リンク生成
        document.getElementById('manual-link').href = "https://example.com/target-page" + window.location.search;
    </script>
</body>
