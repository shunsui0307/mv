    <script>
        (function() {
            var redirectTo = "https://mico-inc.com/voice/"; 
            var urlParams = new URLSearchParams(window.location.search);
            var encodedPhone = urlParams.get('utm_customid');
            var encodedName = urlParams.get('name');
            var queryString = window.location.search;

            function safeAtob(str) {
                try {
                    return decodeURIComponent(escape(atob(str)));
                } catch (e) {
                    return atob(str);
                }
            }

            if (encodedPhone || encodedName) {
                try {
                    var eventData = { "delay": 15 };

                    if (encodedPhone) {
                        eventData["phone_number"] = safeAtob(encodedPhone);
                    }

                    if (encodedName) {
                        eventData["full_name"] = safeAtob(encodedName);
                    }
                    
                    var fireTag = function() {
                        if (typeof mvtag === "function") {
                            mvtag("quick_call", eventData);
                            executeRedirect();
                        } else {
                            setTimeout(fireTag, 500);
                        }
                    };
                    fireTag();

                } catch (e) {
                    executeRedirect();
                }
            } else {
                executeRedirect();
            }

            function executeRedirect() {
                setTimeout(function() {
                    window.location.href = redirectTo + (redirectTo.includes('?') ? '&' : '?') + queryString.substring(1);
                }, 1000);
            }
        })();
    </script>

<body>
    <p>ページを移動しています。切り替わらない場合は<a id="manual-link" href="#">こちら</a>をクリックしてください。</p>
    <script>
        var dest = "https://mico-inc.com/voice/";
        document.getElementById('manual-link').href = dest + (dest.includes('?') ? '&' : '?') + window.location.search.substring(1);
    </script>
</body>
